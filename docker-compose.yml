version: "3.9"

# ─── Shared network ──────────────────────────────────────────────────────────
networks:
  digicam-net:
    driver: bridge

# ─── Named volumes ────────────────────────────────────────────────────────────
volumes:
  mysql-data:
  rabbitmq-data:

# ─── Services ─────────────────────────────────────────────────────────────────
services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  traefik:
    image: traefik:v3.0
    ports:
      - "80:80"
      - "8080:8080"   # Dashboard (dev only)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./gateway/traefik.yml:/traefik.yml:ro
    networks: [digicam-net]

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_ROOT_HOST: "%"
    volumes:
      - mysql-data:/var/lib/mysql
      # Each service owns its init.sql — numbered so MySQL runs them in order
      - ./services/atomic/user/init.sql:/docker-entrypoint-initdb.d/01-user.sql:ro
      - ./services/atomic/camera/init.sql:/docker-entrypoint-initdb.d/02-camera.sql:ro
      - ./services/atomic/auction/init.sql:/docker-entrypoint-initdb.d/03-auction.sql:ro
      - ./services/atomic/order/init.sql:/docker-entrypoint-initdb.d/04-order.sql:ro
      - ./services/atomic/payment/init.sql:/docker-entrypoint-initdb.d/05-payment.sql:ro
    networks: [digicam-net]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "15672:15672"   # Management UI (dev only)
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks: [digicam-net]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Atomic Services ─────────────────────────────────────────────────────────

  user:
    build: ./services/atomic/user
    environment:
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-root}@mysql:3306/userdb
    depends_on:
      mysql:
        condition: service_healthy
    networks: [digicam-net]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.user.rule=PathPrefix(`/user`)"
      - "traefik.http.services.user.loadbalancer.server.port=5001"

  camera:
    build: ./services/atomic/camera
    environment:
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-root}@mysql:3306/cameradb
    depends_on:
      mysql:
        condition: service_healthy
    networks: [digicam-net]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.camera.rule=PathPrefix(`/camera`)"
      - "traefik.http.services.camera.loadbalancer.server.port=5002"

  auction:
    build: ./services/atomic/auction
    environment:
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-root}@mysql:3306/auctiondb
    depends_on:
      mysql:
        condition: service_healthy
    networks: [digicam-net]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auction.rule=PathPrefix(`/auction`)"
      - "traefik.http.services.auction.loadbalancer.server.port=5003"

  order:
    build: ./services/atomic/order
    environment:
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-root}@mysql:3306/orderdb
    depends_on:
      mysql:
        condition: service_healthy
    networks: [digicam-net]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.order.rule=PathPrefix(`/order`)"
      - "traefik.http.services.order.loadbalancer.server.port=5004"

  payment:
    build: ./services/atomic/payment
    environment:
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-root}@mysql:3306/paymentdb
    depends_on:
      mysql:
        condition: service_healthy
    networks: [digicam-net]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.payment.rule=PathPrefix(`/payment`)"
      - "traefik.http.services.payment.loadbalancer.server.port=5005"

  # ── Composite Services ──────────────────────────────────────────────────────

  create-auction:
    build: ./services/composite/create-auction
    environment:
      USER_SERVICE_URL: http://user:5001
      CAMERA_SERVICE_URL: http://camera:5002
      AUCTION_SERVICE_URL: http://auction:5003
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-ap-southeast-1}
      S3_BUCKET: ${S3_BUCKET:-digicam-images}
      GOOGLE_VISION_API_KEY: ${GOOGLE_VISION_API_KEY}
      PRICE_MODEL_URL: http://price-model:5100
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks: [digicam-net]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.create-auction.rule=PathPrefix(`/auction/create`)"
      - "traefik.http.services.create-auction.loadbalancer.server.port=5010"

  process-bid:
    build: ./services/composite/process-bid
    environment:
      USER_SERVICE_URL: http://user:5001
      AUCTION_SERVICE_URL: http://auction:5003
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks: [digicam-net]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.process-bid.rule=PathPrefix(`/bid`)"
      - "traefik.http.services.process-bid.loadbalancer.server.port=5011"

  process-winner:
    build: ./services/composite/process-winner
    environment:
      USER_SERVICE_URL: http://user:5001
      AUCTION_SERVICE_URL: http://auction:5003
      ORDER_SERVICE_URL: http://order:5004
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks: [digicam-net]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.process-winner.rule=PathPrefix(`/process-winner`) || PathPrefix(`/rollback`)"
      - "traefik.http.services.process-winner.loadbalancer.server.port=5012"

  process-payment:
    build: ./services/composite/process-payment
    environment:
      ORDER_SERVICE_URL: http://order:5004
      PAYMENT_SERVICE_URL: http://payment:5005
      PROCESS_WINNER_URL: http://process-winner:5012
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      PAYMENT_SUCCESS_URL: ${PAYMENT_SUCCESS_URL:-http://localhost/payment/success}
      PAYMENT_CANCEL_URL: ${PAYMENT_CANCEL_URL:-http://localhost/payment/cancel}
    networks: [digicam-net]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.process-payment.rule=PathPrefix(`/process-payment`) || PathPrefix(`/webhook`)"
      - "traefik.http.services.process-payment.loadbalancer.server.port=5013"

  # ── Frontend ────────────────────────────────────────────────────────────────

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    networks: [digicam-net]

  # ── Notification ────────────────────────────────────────────────────────────

  notification:
    build: ./services/notification
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks: [digicam-net]
