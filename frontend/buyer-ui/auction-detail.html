<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="../js/zoom-persist.js"></script>
  <title>Auction Detail — SMugShotz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#000; --surface:#0f0f0f; --surface2:#1a1a1a; --accent:#e63946; --text:#fff; --muted:#6e6e73; --border:#222; --success:#30d158; }
    body { background: var(--bg); color: var(--text); font-family:'Inter',sans-serif; min-height:100vh; }

    /* ── Nav ── */
    nav { position:fixed; top:0; z-index:100; width:100%; background:rgba(0,0,0,.85); backdrop-filter:blur(24px); border-bottom:1px solid #1a1a1a; height:60px; display:grid; grid-template-columns:1fr auto 1fr; align-items:center; padding:0 48px; }
    .nav-logo { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:20px; color:var(--text); text-decoration:none; }
    .nav-logo span { color:var(--accent); }
    .nav-links { display:flex; gap:40px; align-items:center; }
    .nav-links a { font-size:14px; color:var(--muted); text-decoration:none; }
    .nav-links a:hover { color:var(--text); }
    .nav-actions { display:flex; gap:12px; align-items:center; justify-self:end; }
    .btn-ghost-sm { color:var(--text); background:transparent; border:1px solid var(--border); padding:8px 20px; font-size:14px; border-radius:50px; text-decoration:none; display:inline-flex; align-items:center; font-weight:600; cursor:pointer; }
    .btn-primary-sm { color:var(--text); background:var(--accent); border:none; padding:8px 20px; font-size:14px; border-radius:50px; text-decoration:none; display:inline-flex; align-items:center; font-weight:600; cursor:pointer; }
    .nav-user { display:flex; align-items:center; gap:8px; text-decoration:none; color:var(--text); font-size:13px; font-weight:500; }
    .nav-user:hover { color:var(--accent); }
    .nav-avatar { width:26px; height:26px; border-radius:50%; background:rgba(230,57,70,0.12); border:1px solid rgba(230,57,70,0.35); display:flex; align-items:center; justify-content:center; color:var(--accent); flex-shrink:0; }
    .nav-username { max-width:110px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

    /* ── Page shell ── */
    .page-shell { max-width:1200px; margin:0 auto; padding:80px 48px 80px; }
    .breadcrumb { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--muted); margin-bottom:24px; padding-top:12px; }
    .breadcrumb a { color:var(--muted); text-decoration:none; }
    .breadcrumb a:hover { color:var(--text); }
    .breadcrumb-sep { opacity:.4; }
    .listing-title { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:clamp(32px,4vw,52px); line-height:.95; text-transform:uppercase; margin-bottom:8px; }
    .listing-subtitle { color:var(--muted); font-size:14px; margin-bottom:32px; }

    /* ── Main 2-col grid ── */
    .listing-grid { display:grid; grid-template-columns:1fr 380px; gap:48px; align-items:start; }

    /* ── Image panel ── */
    .image-main { width:100%; aspect-ratio:4/3; background:linear-gradient(135deg,#111,#181818); border-radius:18px; overflow:hidden; display:flex; align-items:center; justify-content:center; border:1px solid var(--border); }
    .image-main img { width:100%; height:100%; object-fit:cover; }
    .image-placeholder { font-size:80px; opacity:.2; }

    /* ── Details below image ── */
    .details-section { margin-top:40px; }
    .section-heading { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:22px; text-transform:uppercase; letter-spacing:.5px; margin-bottom:16px; padding-bottom:10px; border-bottom:1px solid var(--border); }
    .specs-grid { display:grid; grid-template-columns:1fr 1fr; gap:0; }
    .spec-item { padding:14px 0; border-bottom:1px solid #141414; }
    .spec-item:nth-child(odd) { padding-right:32px; }
    .spec-label { font-size:11px; font-weight:600; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:5px; }
    .spec-value { font-size:15px; font-weight:500; color:var(--text); }
    .condition-bar { display:flex; align-items:center; gap:10px; margin-top:4px; }
    .bar-track { flex:1; height:4px; background:#1a1a1a; border-radius:2px; overflow:hidden; }
    .bar-fill { height:100%; border-radius:2px; background:var(--accent); transition:width .6s ease; }
    .description-section { margin-top:32px; }
    .description-text { color:var(--muted); font-size:14px; line-height:1.8; }

    /* ── Sticky bid panel ── */
    .bid-panel { position:sticky; top:76px; background:var(--surface); border:1px solid var(--border); border-radius:20px; overflow:hidden; }
    .bid-panel-inner { padding:24px; }

    /* Countdown */
    .countdown-wrap { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:24px; padding-bottom:24px; border-bottom:1px solid var(--border); }
    .countdown-unit { background:var(--surface2); border-radius:12px; padding:12px 8px; text-align:center; }
    .countdown-num { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:32px; line-height:1; color:var(--text); }
    .countdown-label { font-size:10px; font-weight:600; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; margin-top:4px; }
    .countdown-ended { text-align:center; padding:16px 0 24px; border-bottom:1px solid var(--border); margin-bottom:0; }
    .countdown-ended-text { font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:800; color:var(--muted); text-transform:uppercase; }

    /* Current bid */
    .bid-label-sm { font-size:10px; font-weight:600; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-bottom:6px; }
    .bid-amount-lg { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:48px; line-height:1; margin-bottom:6px; }
    .bid-starting-sm { font-size:13px; color:var(--muted); margin-bottom:20px; }

    /* Quick bid chips */
    .quick-bids { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
    .quick-bid-chip { flex:1; min-width:70px; padding:10px 6px; border-radius:50px; border:1px solid var(--border); background:transparent; color:var(--text); font-size:13px; font-weight:600; cursor:pointer; text-align:center; transition:border-color .2s, background .2s; }
    .quick-bid-chip:hover { border-color:var(--accent); background:rgba(230,57,70,.08); }
    .quick-bid-chip.selected { border-color:var(--accent); background:rgba(230,57,70,.15); color:var(--accent); }

    /* Bid input + button */
    .bid-input { width:100%; background:#090909; color:var(--text); border:1px solid #232323; border-radius:14px; padding:14px 16px; font-size:15px; margin-bottom:10px; }
    .bid-input:focus { outline:none; border-color:var(--accent); }
    .btn-place-bid { width:100%; padding:15px 20px; font-size:15px; font-weight:700; border-radius:50px; background:var(--accent); color:var(--text); border:none; cursor:pointer; transition:opacity .2s; letter-spacing:.3px; }
    .btn-place-bid:hover { opacity:.88; }
    .btn-place-bid:disabled { background:#262626; color:var(--muted); cursor:not-allowed; opacity:1; }
    .own-pill { width:100%; border-radius:50px; padding:14px 18px; background:#111; border:1px solid #252525; color:var(--muted); text-align:center; font-size:14px; font-weight:600; }
    .bid-feedback { font-size:13px; line-height:1.6; margin-top:10px; min-height:18px; text-align:center; }
    .bid-feedback.success { color:var(--success); }
    .bid-feedback.error { color:var(--accent); }

    /* Auction meta strip */
    .panel-meta { border-top:1px solid var(--border); padding:16px 24px; display:grid; gap:10px; }
    .panel-meta-row { display:flex; justify-content:space-between; font-size:13px; color:var(--muted); }
    .panel-meta-row strong { color:var(--text); font-weight:500; }

    /* States */
    .loading-state { text-align:center; padding:140px 24px; color:var(--muted); font-size:16px; }
    .error-state { text-align:center; padding:140px 24px; }
    .error-heading { font-family:'Barlow Condensed',sans-serif; font-size:34px; font-weight:800; text-transform:uppercase; margin-bottom:12px; }
    .error-sub { color:var(--muted); margin-bottom:28px; }

    /* Status badge */
    .status-badge { display:inline-flex; align-items:center; gap:6px; border-radius:50px; padding:5px 14px; font-size:11px; font-weight:700; margin-bottom:12px; }
    .status-badge.live { background:rgba(230,57,70,.15); color:var(--accent); border:1px solid rgba(230,57,70,.3); }
    .status-badge.live::before { content:''; width:6px; height:6px; border-radius:50%; background:var(--accent); animation:pulse 1.4s infinite; }
    .status-badge.ended { background:rgba(110,110,115,.15); color:var(--muted); border:1px solid rgba(110,110,115,.25); }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.3; } }

    @media (max-width:900px) {
      nav { padding:0 20px; }
      .nav-links { display:none; }
      .page-shell { padding:72px 20px 60px; }
      .listing-grid { grid-template-columns:1fr; }
      .bid-panel { position:static; }
      .specs-grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="../index.html" class="nav-logo">SMug<span>Shotz</span></a>
    <div class="nav-links">
      <a href="./index.html">Auctions</a>
      <a href="../seller-ui/index.html">Create Auction</a>
      <a href="../profile.html">Profile</a>
    </div>
    <div class="nav-actions" id="navActions"></div>
  </nav>

  <div class="page-shell">
    <div id="loadingState" class="loading-state">Loading auction details…</div>

    <div id="errorState" class="error-state" style="display:none;">
      <div class="error-heading">Auction Not Found</div>
      <p class="error-sub">This auction doesn't exist or couldn't be loaded.</p>
      <a href="./index.html" class="btn-primary-sm">Back to Auctions</a>
    </div>

    <div id="detailWrap" style="display:none;">
      <!-- Breadcrumb -->
      <div class="breadcrumb">
        <a href="./index.html">Auctions</a>
        <span class="breadcrumb-sep">›</span>
        <span id="breadcrumbModel">—</span>
      </div>

      <!-- Title -->
      <div id="statusBadge" class="status-badge live">LIVE</div>
      <h1 class="listing-title" id="listingTitle">—</h1>
      <p class="listing-subtitle" id="listingSubtitle"></p>

      <!-- Main grid -->
      <div class="listing-grid">

        <!-- Left: image + details -->
        <div>
          <div class="image-main" id="detailImage">
            <span class="image-placeholder">📷</span>
          </div>

          <!-- Camera specs -->
          <div class="details-section" id="detailsSection" style="display:none;">
            <div class="section-heading">Camera Details</div>
            <div class="specs-grid" id="specsGrid"></div>
          </div>

          <!-- Description -->
          <div class="description-section" id="descriptionSection" style="display:none;">
            <div class="section-heading" style="margin-top:32px;">Description</div>
            <p class="description-text" id="descriptionText"></p>
          </div>
        </div>

        <!-- Right: sticky bid panel -->
        <div>
          <div class="bid-panel">
            <div class="bid-panel-inner">
              <!-- Countdown -->
              <div id="countdownWrap" class="countdown-wrap">
                <div class="countdown-unit"><div class="countdown-num" id="cdDays">--</div><div class="countdown-label">Days</div></div>
                <div class="countdown-unit"><div class="countdown-num" id="cdHours">--</div><div class="countdown-label">Hours</div></div>
                <div class="countdown-unit"><div class="countdown-num" id="cdMins">--</div><div class="countdown-label">Mins</div></div>
                <div class="countdown-unit"><div class="countdown-num" id="cdSecs">--</div><div class="countdown-label">Secs</div></div>
              </div>

              <!-- Current bid -->
              <div class="bid-label-sm">Current Highest Bid</div>
              <div class="bid-amount-lg" id="bidAmountDisplay">—</div>
              <div class="bid-starting-sm" id="bidStartingDisplay"></div>

              <!-- Bid area -->
              <div id="bidArea"></div>
            </div>

            <!-- Meta strip -->
            <div class="panel-meta" id="panelMeta"></div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'smugshotz_user';
    const AUCTIONS_API_URL = 'https://personal-vsev7crp.outsystemscloud.com/Auction/rest/Auction';
    const BID_API_URL = localStorage.getItem('smugshotz_bid_api') || 'http://localhost:5011/bid';
    const CAMERA_SERVICE_URL = 'http://localhost:5002/camera';

    let countdownInterval = null;
    let currentAuction = null;

    function getStoredUser() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null'); } catch (_) { return null; }
    }
    function fmtSGD(amount) {
      return 'SGD ' + Number(amount || 0).toLocaleString('en-SG', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    function isActive(auction) {
      if (!auction.end_time) return true;
      return new Date(auction.end_time).getTime() > Date.now();
    }
    function fmtDate(dateStr) {
      if (!dateStr) return '—';
      return new Date(dateStr).toLocaleString('en-SG', { dateStyle: 'medium', timeStyle: 'short' });
    }
    function pad(n) { return String(n).padStart(2, '0'); }
    function normaliseAuction(raw) {
      const highest = raw.current_highest_bid ?? raw.current_bid ?? 0;
      return {
        auction_id: Number(raw.auction_id ?? raw.id),
        seller_id: Number(raw.seller_id),
        camera_id: raw.camera_id ?? null,
        camera_model: raw.camera_model || raw.model || `Camera #${raw.camera_id ?? raw.auction_id ?? ''}`.trim(),
        start_price: Number(raw.start_price ?? 0),
        current_highest_bid: Number(highest ?? 0),
        highest_bidder_id: raw.highest_bidder_id ?? null,
        end_time: raw.end_time || raw.endDate || null,
        status: raw.status || 'ACTIVE'
      };
    }

    function startCountdown(endTime) {
      if (countdownInterval) clearInterval(countdownInterval);
      if (!endTime) {
        document.getElementById('countdownWrap').innerHTML =
          '<div class="countdown-ended"><div class="countdown-ended-text">No End Date Set</div></div>';
        return;
      }
      function tick() {
        const diff = new Date(endTime).getTime() - Date.now();
        if (diff <= 0) {
          clearInterval(countdownInterval);
          document.getElementById('countdownWrap').innerHTML =
            '<div class="countdown-ended"><div class="countdown-ended-text">Auction Ended</div></div>';
          return;
        }
        const d = Math.floor(diff / 86400000);
        const h = Math.floor((diff % 86400000) / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        document.getElementById('cdDays').textContent = pad(d);
        document.getElementById('cdHours').textContent = pad(h);
        document.getElementById('cdMins').textContent = pad(m);
        document.getElementById('cdSecs').textContent = pad(s);
      }
      tick();
      countdownInterval = setInterval(tick, 1000);
    }

    function renderBidArea(auction, currentUserId) {
      const active = isActive(auction) && String(auction.status).toUpperCase() !== 'COMPLETED';
      const isOwn = currentUserId && Number(auction.seller_id) === Number(currentUserId);
      const bidArea = document.getElementById('bidArea');

      if (isOwn) {
        bidArea.innerHTML = `<div class="own-pill">Your listing — bidding disabled</div>`;
        return;
      }
      if (!active) {
        bidArea.innerHTML = `<button class="btn-place-bid" disabled>Auction Ended</button>`;
        return;
      }
      if (!currentUserId) {
        bidArea.innerHTML = `<a href="../seller-ui/signup.html" class="btn-place-bid" style="display:block;text-align:center;text-decoration:none;">Sign in to place a bid</a>`;
        return;
      }

      const currentBid = Number(auction.current_highest_bid || 0);
      const startPrice = Number(auction.start_price || 0);
      const base = Math.max(currentBid, startPrice);
      const minBid = base + 1;
      const suggestions = [
        Math.ceil(base * 1.05) || minBid,
        Math.ceil(base * 1.10) || minBid + 5,
        Math.ceil(base * 1.20) || minBid + 10
      ].filter((v, i, a) => a.indexOf(v) === i && v >= minBid);

      bidArea.innerHTML = `
        <div class="quick-bids" id="quickBids">
          ${suggestions.map(v => `<button class="quick-bid-chip" data-val="${v}">${fmtSGD(v)}</button>`).join('')}
        </div>
        <input class="bid-input" type="number" id="bidAmountInput" min="${minBid}" step="1" placeholder="Or enter: min ${fmtSGD(minBid)}" />
        <button class="btn-place-bid" id="placeBidBtn">Place Bid</button>
        <div class="bid-feedback" id="bidFeedback"></div>
      `;

      document.querySelectorAll('.quick-bid-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          document.querySelectorAll('.quick-bid-chip').forEach(c => c.classList.remove('selected'));
          chip.classList.add('selected');
          document.getElementById('bidAmountInput').value = chip.dataset.val;
        });
      });

      document.getElementById('placeBidBtn').addEventListener('click', () => submitBid(auction, currentUserId));
    }

    async function submitBid(auction, currentUserId) {
      const feedback = document.getElementById('bidFeedback');
      const submitBtn = document.getElementById('placeBidBtn');
      const amount = Number(document.getElementById('bidAmountInput').value);
      const minBid = Math.max(Number(auction.start_price || 0), Number(auction.current_highest_bid || 0)) + 1;
      if (!amount || amount < minBid) {
        feedback.className = 'bid-feedback error';
        feedback.textContent = `Minimum bid is ${fmtSGD(minBid)}`;
        return;
      }
      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting…';
      feedback.textContent = '';
      feedback.className = 'bid-feedback';
      try {
        const res = await fetch(BID_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ auction_id: auction.auction_id, bidder_id: currentUserId, bid_amount: amount })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || data.message || `HTTP ${res.status}`);
        feedback.classList.add('success');
        feedback.textContent = data.message || 'Bid placed successfully!';
        setTimeout(() => loadDetail(), 1200);
      } catch (err) {
        feedback.classList.add('error');
        feedback.textContent = err.message || 'Failed to place bid.';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Place Bid';
      }
    }

    async function loadDetail() {
      const params = new URLSearchParams(window.location.search);
      const auctionId = Number(params.get('id'));
      if (!auctionId) { showError(); return; }

      try {
        const res = await fetch(AUCTIONS_API_URL);
        if (!res.ok) throw new Error();
        const data = await res.json();
        const list = Array.isArray(data) ? data : (data.Out1 || []);
        const raw = list.find(a => Number(a.auction_id ?? a.id) === auctionId);
        if (!raw) { showError(); return; }
        currentAuction = normaliseAuction(raw);

        // Fetch camera details
        let cameraData = null;
        if (currentAuction.camera_id) {
          try {
            const camRes = await fetch(`${CAMERA_SERVICE_URL}/${currentAuction.camera_id}`);
            if (camRes.ok) cameraData = await camRes.json();
          } catch (_) {}
        }

        renderDetail(currentAuction, cameraData);
      } catch (_) {
        showError();
      }
    }

    function renderDetail(auction, cameraData) {
      const active = isActive(auction) && String(auction.status).toUpperCase() !== 'COMPLETED';
      const user = getStoredUser();
      const currentUserId = user && user.user_id ? Number(user.user_id) : null;

      document.title = `${auction.camera_model} — SMugShotz`;

      // Breadcrumb + title
      document.getElementById('breadcrumbModel').textContent = auction.camera_model;
      document.getElementById('listingTitle').textContent = auction.camera_model;
      document.getElementById('listingSubtitle').textContent = `Auction #${auction.auction_id} · Listed by Seller #${auction.seller_id}`;

      // Status badge
      const badge = document.getElementById('statusBadge');
      badge.textContent = active ? 'LIVE' : 'ENDED';
      badge.className = `status-badge ${active ? 'live' : 'ended'}`;

      // Camera image
      const imgEl = document.getElementById('detailImage');
      const imageUrl = cameraData?.s3_image_url || null;
      if (imageUrl) {
        imgEl.innerHTML = `<img src="${imageUrl}" alt="${auction.camera_model}" onerror="this.parentElement.innerHTML='<span class=\\'image-placeholder\\'>📷</span>'" />`;
      }

      // Countdown
      startCountdown(auction.end_time);

      // Bid display
      document.getElementById('bidAmountDisplay').textContent =
        auction.current_highest_bid > 0 ? fmtSGD(auction.current_highest_bid) : 'No bids yet';
      document.getElementById('bidStartingDisplay').textContent = `Starting at ${fmtSGD(auction.start_price)}`;

      // Bid area
      renderBidArea(auction, currentUserId);

      // Panel meta strip
      document.getElementById('panelMeta').innerHTML = `
        <div class="panel-meta-row"><span>Auction ID</span><strong>#${auction.auction_id}</strong></div>
        <div class="panel-meta-row"><span>Ends</span><strong>${fmtDate(auction.end_time)}</strong></div>
        ${auction.highest_bidder_id ? `<div class="panel-meta-row"><span>Highest Bidder</span><strong>#${auction.highest_bidder_id}</strong></div>` : ''}
        <div class="panel-meta-row"><span>Status</span><strong>${auction.status}</strong></div>
      `;

      // Camera specs
      if (cameraData) {
        const score = cameraData.ai_condition_score ?? cameraData.condition_score ?? null;
        const scorePct = score != null ? Math.round((score / 10) * 100) : null;
        const specs = [
          { label: 'Model', value: cameraData.model || '—' },
          { label: 'Shutter Count', value: cameraData.shutter_count != null ? `${Number(cameraData.shutter_count).toLocaleString()} shots` : '—' },
          { label: 'Camera ID', value: `#${cameraData.camera_id}` },
          { label: 'Seller ID', value: `#${cameraData.seller_id}` },
          ...(score != null ? [{ label: 'AI Condition Score', value: score.toFixed(1) + ' / 10', bar: scorePct }] : []),
          { label: 'Listed', value: cameraData.status || '—' },
        ];

        document.getElementById('specsGrid').innerHTML = specs.map(s => `
          <div class="spec-item">
            <div class="spec-label">${s.label}</div>
            <div class="spec-value">${s.value}</div>
            ${s.bar != null ? `<div class="condition-bar"><div class="bar-track"><div class="bar-fill" style="width:${s.bar}%"></div></div><span style="font-size:12px;color:var(--muted)">${s.bar}%</span></div>` : ''}
          </div>
        `).join('');
        document.getElementById('detailsSection').style.display = 'block';

        if (cameraData.description) {
          document.getElementById('descriptionText').textContent = cameraData.description;
          document.getElementById('descriptionSection').style.display = 'block';
        }
      }

      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('detailWrap').style.display = 'block';
    }

    function showError() {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('errorState').style.display = 'block';
    }

    loadDetail();
  </script>

  <script>
  (function() {
    const KEY = 'smugshotz_user';
    const user = (function() { try { return JSON.parse(localStorage.getItem(KEY) || 'null'); } catch(e) { return null; } })();
    const nav = document.getElementById('navActions');
    if (!nav) return;
    if (user && user.user_id) {
      nav.innerHTML =
        '<a href="../profile.html" class="nav-user" title="View profile">' +
          '<span class="nav-avatar"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></span>' +
          '<span class="nav-username">' + (user.name || 'Profile') + '</span>' +
        '</a>' +
        '<button class="btn-ghost-sm" id="navLogout">Log Out</button>';
      document.getElementById('navLogout').addEventListener('click', function() {
        localStorage.removeItem(KEY);
        localStorage.removeItem('user_id');
        window.location.reload();
      });
    } else {
      nav.innerHTML =
        '<a href="../seller-ui/login.html" class="btn-ghost-sm">Sign In</a>' +
        '<a href="../seller-ui/index.html" class="btn-primary-sm">Create Auction</a>';
    }
  })();
  </script>
