<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="../js/zoom-persist.js"></script>
  <title>Sign In — SMugShotz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000000;
      --surface: #0f0f0f;
      --accent: #e63946;
      --text: #ffffff;
      --muted: #6e6e73;
      --border: #222222;
      --success: #30d158;
      --danger: #ff4444;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    nav {
      position: fixed;
      top: 0;
      z-index: 100;
      width: 100%;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid #1a1a1a;
      height: 60px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 48px;
    }

    .nav-logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 20px;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 0.5px;
    }
    .nav-logo span { color: var(--accent); }

    .nav-links {
      display: flex;
      gap: 40px;
      align-items: center;
    }
    .nav-links a {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.25s ease;
    }
    .nav-links a:hover { color: var(--text); }

    .nav-actions {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-self: end;
    }

    .btn-ghost-sm {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 8px 20px;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.25s ease;
      display: inline-flex;
      align-items: center;
    }

    .btn-primary-sm {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      background: var(--accent);
      border: none;
      border-radius: 50px;
      padding: 8px 20px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }

    .page-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 24px 48px;
    }

    .login-card {
      width: 100%;
      max-width: 520px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px;
    }

    .overline {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 3px;
      text-transform: uppercase;
      display: block;
      margin-bottom: 16px;
    }

    .login-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: clamp(38px, 5vw, 56px);
      text-transform: uppercase;
      line-height: 0.95;
      margin-bottom: 14px;
    }

    .login-sub {
      font-size: 15px;
      color: var(--muted);
      font-weight: 300;
      line-height: 1.6;
      margin-bottom: 36px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 20px;
    }

    .field-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .field-input {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      color: var(--text);
      padding: 14px 16px;
      font-size: 14px;
      width: 100%;
      font-family: 'Inter', sans-serif;
    }

    .field-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.15);
    }

    .btn-submit {
      width: 100%;
      background: var(--accent);
      color: var(--text);
      padding: 18px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      margin-top: 10px;
      font-family: 'Inter', sans-serif;
      transition: filter 0.2s, transform 0.2s;
    }

    .btn-submit:hover:not(:disabled) {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }

    .btn-submit:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .status-card {
      display: none;
      margin-top: 24px;
      border-radius: 16px;
      padding: 28px;
      border: 1px solid var(--border);
    }
    .status-card.visible { display: block; }

    .success-card {
      background: rgba(48, 209, 88, 0.05);
      border-left: 3px solid var(--success);
    }
    .error-card {
      background: rgba(255, 68, 68, 0.05);
      border-left: 3px solid var(--danger);
    }

    .status-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 24px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .success-card .status-title { color: var(--success); }
    .error-card .status-title { color: var(--danger); }

    .status-text {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.65;
    }

    .divider {
      text-align: center;
      margin: 28px 0 0;
      font-size: 14px;
      color: var(--muted);
    }
    .divider a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    .divider a:hover { text-decoration: underline; }

    .nav-user { display:flex; align-items:center; gap:8px; text-decoration:none; color:var(--text); font-size:13px; font-weight:500; transition:color 0.2s; }
    .nav-user:hover { color:var(--accent); }
    .nav-avatar { width:26px; height:26px; border-radius:50%; background:rgba(230,57,70,0.12); border:1px solid rgba(230,57,70,0.35); display:flex; align-items:center; justify-content:center; color:var(--accent); flex-shrink:0; }
    .nav-username { max-width:110px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

    @media (max-width: 768px) {
      nav { padding: 0 24px; }
      .nav-links { display: none; }
      .login-card { padding: 30px 24px; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="../index.html" class="nav-logo">SMug<span>Shotz</span></a>
    <div class="nav-links">
      <a href="../buyer-ui/index.html">Auctions</a>
      <a href="./index.html">Create Auction</a>
    </div>
    <div class="nav-actions" id="navActions">
      <a href="./login.html" class="btn-ghost-sm">Sign In</a>
      <a href="../buyer-ui/index.html" class="btn-primary-sm">Get Started</a>
    </div>
  </nav>

  <main class="page-shell">
    <section class="login-card">
      <span class="overline">Welcome Back</span>
      <h1 class="login-title">Sign In</h1>
      <p class="login-sub">Enter the email address associated with your account.</p>

      <form id="loginForm" novalidate>
        <div class="field-group">
          <label class="field-label" for="email">Email Address</label>
          <input class="field-input" type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
        </div>
        <button type="submit" class="btn-submit" id="submitBtn">Sign In</button>
      </form>

      <div class="status-card success-card" id="successCard">
        <div class="status-title">Welcome Back!</div>
        <p class="status-text" id="successText">Signed in successfully. Redirecting…</p>
      </div>

      <div class="status-card error-card" id="errorCard">
        <div class="status-title">Sign In Failed</div>
        <p class="status-text" id="errorText">No account found with that email address.</p>
      </div>

      <p class="divider">Don't have an account? <a href="./signup.html">Create one</a></p>
    </section>
  </main>

  <script>
    const API_URL = 'https://personal-vsev7crp.outsystemscloud.com/User/rest/User/user/';
    const STORAGE_KEY = 'smugshotz_user';

    // If already logged in, redirect straight to profile
    (function() {
      try {
        const u = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
        if (u && u.user_id) window.location.href = '../profile.html';
      } catch(e) {}
    })();

    const loginForm   = document.getElementById('loginForm');
    const submitBtn   = document.getElementById('submitBtn');
    const successCard = document.getElementById('successCard');
    const successText = document.getElementById('successText');
    const errorCard   = document.getElementById('errorCard');
    const errorText   = document.getElementById('errorText');

    loginForm.addEventListener('submit', async function(e) {
      e.preventDefault();
      successCard.classList.remove('visible');
      errorCard.classList.remove('visible');

      const email = document.getElementById('email').value.trim();
      if (!email) {
        errorText.textContent = 'Please enter your email address.';
        errorCard.classList.add('visible');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in…';

      try {
        // Look up user by email
        const res = await fetch(API_URL + '?email=' + encodeURIComponent(email));
        let data = {};
        try { data = await res.json(); } catch(_) {}

        // Handle both array response and single-object response
        const payload = data?.data ?? data;
        const user = Array.isArray(payload) ? payload[0] : payload;

        if (!res.ok || !user || !user.user_id) {
          errorText.textContent = 'No account found with that email. Please check your email or create a new account.';
          errorCard.classList.add('visible');
          return;
        }

        const stored = {
          user_id: Number(user.user_id),
          name: user.name || user.Name || '',
          email: user.email || user.Email || email,
          telegram_handle: user.telegram_handle || user.TelegramHandle || ''
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(stored));
        localStorage.setItem('user_id', String(stored.user_id));

        successText.textContent = 'Signed in as ' + stored.name + '. Redirecting…';
        successCard.classList.add('visible');
        loginForm.style.display = 'none';

        setTimeout(function() {
          const redirect = new URLSearchParams(window.location.search).get('redirect');
          window.location.href = redirect || '../profile.html';
        }, 1200);

      } catch(err) {
        errorText.textContent = 'Network error. Please check your connection and try again.';
        errorCard.classList.add('visible');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    });
  </script>

  <script>
  (function() {
    const KEY = 'smugshotz_user';
    const user = (function() { try { return JSON.parse(localStorage.getItem(KEY) || 'null'); } catch(e) { return null; } })();
    const nav = document.getElementById('navActions');
    if (!nav) return;
    if (user && user.user_id) {
      nav.innerHTML =
        '<a href="../profile.html" class="nav-user" title="View profile">' +
          '<span class="nav-avatar"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></span>' +
          '<span class="nav-username">' + (user.name || 'Profile') + '</span>' +
        '</a>' +
        '<button class="btn-ghost-sm" id="navLogout">Log Out</button>';
      document.getElementById('navLogout').addEventListener('click', function() {
        localStorage.removeItem(KEY);
        localStorage.removeItem('user_id');
        window.location.reload();
      });
    } else {
      nav.innerHTML =
        '<a href="./login.html" class="btn-ghost-sm">Sign In</a>' +
        '<a href="../buyer-ui/index.html" class="btn-primary-sm">Get Started</a>';
    }
  })();
  </script>
</body>
</html>
