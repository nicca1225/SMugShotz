syntax = "proto3";

package order;

// The order service definition
service OrderService {
  rpc CreateOrder (CreateOrderRequest) returns (CreateOrderResponse);
}

message CreateOrderRequest {
  int32 auction_id = 1;
  int32 buyer_id   = 2;
  int32 seller_id  = 3;
  float amount     = 4;
  string status    = 5;
}

message CreateOrderResponse {
  int32  order_id   = 1;
  int32  auction_id = 2;
  int32  buyer_id   = 3;
  int32  seller_id  = 4;
  float  amount     = 5;
  string status     = 6;
}
